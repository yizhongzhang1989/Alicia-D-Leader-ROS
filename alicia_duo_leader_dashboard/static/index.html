<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alicia-D Leader Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; }
        #viewer { width: 100vw; height: 100vh; display: block; }

        #panel {
            position: fixed; top: 10px; right: 10px;
            background: rgba(20, 20, 40, 0.92);
            color: #e0e0e0; padding: 16px; border-radius: 8px;
            max-height: 90vh; overflow-y: auto; min-width: 320px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(79, 195, 247, 0.3);
        }
        #panel h2 {
            font-size: 15px; margin-bottom: 12px; color: #4fc3f7;
            border-bottom: 1px solid rgba(79, 195, 247, 0.3); padding-bottom: 8px;
        }
        .joint-row {
            display: flex; align-items: center; margin-bottom: 6px;
            padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .joint-label { width: 28px; font-size: 12px; color: #b0bec5; font-weight: 500; }
        .joint-bar-bg {
            flex: 1; height: 20px; background: #0f1923; border-radius: 4px;
            position: relative; overflow: hidden; margin: 0 4px;
        }
        .joint-bar {
            height: 100%; border-radius: 4px;
            transition: width 0.06s ease-out; position: absolute; top: 0;
        }
        .joint-bar.positive { left: 50%; }
        .joint-bar.negative { right: 50%; }
        .joint-center {
            position: absolute; left: 50%; top: 0; bottom: 0;
            width: 1px; background: #37474f; z-index: 2;
        }
        .joint-val {
            width: 70px; text-align: right; font-size: 11px;
            font-family: 'Consolas', monospace; color: #4fc3f7;
        }
        .info-row {
            display: flex; justify-content: space-between;
            padding: 4px 0; font-size: 12px;
        }
        .info-label { color: #78909c; }
        .info-value { color: #66bb6a; font-family: 'Consolas', monospace; }
        .status-dot {
            display: inline-block; width: 8px; height: 8px;
            border-radius: 50%; margin-right: 6px; vertical-align: middle;
        }
        .status-dot.connected { background: #66bb6a; }
        .status-dot.disconnected { background: #ef5350; }
        .section { margin-top: 12px; }
        .section-title {
            font-size: 11px; color: #78909c; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 6px;
        }

        #loading {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #4fc3f7; font-size: 18px; text-align: center;
        }
        .spinner {
            border: 3px solid rgba(79,195,247,0.15);
            border-top: 3px solid #4fc3f7;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "./vendor/three.module.js",
            "three/addons/": "./vendor/addons/",
            "three/examples/jsm/": "./vendor/addons/"
        }
    }
    </script>
</head>
<body>
    <canvas id="viewer"></canvas>
    <div id="loading"><div class="spinner"></div>Loading 3D model...</div>

    <div id="panel" style="display:none;">
        <h2>Alicia-D Leader</h2>
        <div style="display:flex;gap:12px;align-items:center;">
            <div><span class="status-dot disconnected" id="serverDot"></span><span id="serverText" style="font-size:12px;color:#78909c;">Server</span></div>
            <div><span class="status-dot disconnected" id="deviceDot"></span><span id="deviceText" style="font-size:12px;color:#78909c;">Device</span></div>
            <button id="btnPublish" onclick="togglePublish()" style="margin-left:auto;font-size:10px;padding:3px 10px;background:#66bb6a;color:#000;border:none;border-radius:3px;cursor:pointer;">Publishing</button>
        </div>

        <div class="section">
            <div class="section-title">Transformed Joints</div>
            <div id="joints"></div>
        </div>
        <div class="section">
            <div class="section-title">Raw Joints (sensor)</div>
            <div id="jointsRaw"></div>
        </div>
        <div class="section">
            <div class="section-title">Info</div>
            <div class="joint-row">
                <div class="joint-label" style="color:#ff9800">Grip</div>
                <div class="joint-bar-bg"><div class="joint-bar" id="gripperBar" style="width:0%;left:0;background:#ff9800"></div></div>
                <div class="joint-val" id="gripperVal">--</div>
            </div>
            <div class="info-row"><span class="info-label">Status</span><span class="info-value" id="statusVal">--</span></div>
            <div class="info-row"><span class="info-label">Rate</span><span class="info-value" id="rateVal">-- Hz</span></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import URDFLoader from './vendor/URDFLoader.js';

        const URDF_PATH = 'robot/model.urdf';
        const JOINT_NAMES = ['joint1','joint2','joint3','joint4','joint5','joint6'];
        const COLORS = ['#42a5f5','#66bb6a','#ffa726','#ef5350','#ab47bc','#26c6da'];
        const STATUS_MAP = {0:'idle',1:'locked',16:'sync',17:'sync_locked',225:'overheat',226:'overheat_protect'};

        // ── Build UI ──
        function buildJointRows(containerId, prefix) {
            const c = document.getElementById(containerId);
            for (let i = 0; i < 6; i++) {
                c.innerHTML += `<div class="joint-row">
                    <div class="joint-label" style="color:${COLORS[i]}">J${i+1}</div>
                    <div class="joint-bar-bg"><div class="joint-center"></div>
                        <div class="joint-bar" id="${prefix}bar${i}" style="width:0%"></div></div>
                    <div class="joint-val" id="${prefix}val${i}">0.00°</div></div>`;
            }
        }
        buildJointRows('joints', 't');
        buildJointRows('jointsRaw', 'r');

        // ── Scene ──
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.001, 100);
        camera.up.set(0, 0, 1);
        camera.position.set(0.8, -0.8, 0.6);

        const canvas = document.getElementById('viewer');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.1;
        controls.target.set(0, 0, 0.15);
        controls.update();

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        scene.add(new THREE.HemisphereLight(0xb0d4f1, 0x404040, 0.8));
        const d1 = new THREE.DirectionalLight(0xffffff, 1.5);
        d1.position.set(3, 5, 3); d1.castShadow = true;
        d1.shadow.mapSize.set(2048, 2048); scene.add(d1);
        const d2 = new THREE.DirectionalLight(0xffffff, 0.5);
        d2.position.set(-2, 3, -1); scene.add(d2);
        const d3 = new THREE.DirectionalLight(0xffffff, 0.3);
        d3.position.set(0, -1, 3); scene.add(d3);

        // Grid + ground (Z-up)
        const grid = new THREE.GridHelper(2, 20, 0x444466, 0x333355);
        grid.rotation.x = Math.PI / 2; scene.add(grid);
        scene.add(new THREE.AxesHelper(0.15));
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), new THREE.ShadowMaterial({ opacity: 0.3 }));
        ground.receiveShadow = true; scene.add(ground);

        // ── Load URDF ──
        let robot = null;
        const loader = new URDFLoader();
        loader.load(URDF_PATH, (result) => {
            robot = result;
            scene.add(robot);
            robot.traverse((child) => {
                if (child.isMesh && child.material) {
                    const c = child.material.color ? child.material.color.clone() : new THREE.Color(0.5, 0.5, 0.5);
                    child.material = new THREE.MeshPhysicalMaterial({ color: c, metalness: 0.3, roughness: 0.5, clearcoat: 0.1 });
                    child.castShadow = true; child.receiveShadow = true;
                }
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('panel').style.display = 'block';
        }, undefined, (err) => {
            document.getElementById('loading').innerHTML = '<div style="color:#ff5252;">Failed to load 3D model<br>' + err + '</div>';
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ── SSE + UI update ──
        let msgCount = 0, lastRateTime = performance.now(), lastRate = 0;
        let rawJointRad = null;

        // Joint ranges (loaded from server config)
        // Transformed: ±180 for non-continuous, ±360 for continuous
        let tRanges = [180, 180, 180, 180, 180, 180];
        // Raw: from URDF joint limits (degrees)
        let rRanges = [[-180,180],[-180,180],[-180,180],[-180,180],[-180,180],[-180,180]];

        // Fetch config on load
        fetch('/api/config').then(r => r.json()).then(cfg => {
            if (cfg.continuous) {
                for (let i = 0; i < 6; i++)
                    tRanges[i] = cfg.continuous[i] ? 360 : 180;
            }
            if (cfg.urdf_limits_deg) {
                rRanges = cfg.urdf_limits_deg;
            }
            console.log('Transformed ranges (deg):', tRanges, 'Raw URDF limits:', rRanges);
        }).catch(() => {});

        function updateBar(prefix, idx, deg, rangeDeg) {
            const bar = document.getElementById(`${prefix}bar${idx}`);
            const pct = Math.min(Math.abs(deg) / rangeDeg * 50, 50);
            bar.style.width = pct + '%';
            bar.className = 'joint-bar ' + (deg >= 0 ? 'positive' : 'negative');
            bar.style.background = `linear-gradient(${deg >= 0 ? '90deg' : '270deg'}, ${COLORS[idx]}88, ${COLORS[idx]})`;
            document.getElementById(`${prefix}val${idx}`).textContent = deg.toFixed(1) + '°';
        }

        function onState(state) {
            for (let i = 0; i < 6; i++) updateBar('t', i, state.joints[i], tRanges[i]);
            if (state.raw) {
                for (let i = 0; i < 6; i++) {
                    // Raw bar range = max of abs(lower) and abs(upper) from URDF
                    const rawRange = Math.max(Math.abs(rRanges[i][0]), Math.abs(rRanges[i][1]));
                    updateBar('r', i, state.raw.joints[i], rawRange);
                }
                rawJointRad = state.raw.joints_rad;
            }
            document.getElementById('gripperVal').textContent = state.gripper.toFixed(0);
            const gripPct = Math.min(Math.max(state.gripper / 1000.0, 0), 1) * 100;
            document.getElementById('gripperBar').style.width = gripPct + '%';
            const sc = state.status;
            document.getElementById('statusVal').textContent = STATUS_MAP[sc] || ('0x' + sc.toString(16));
            msgCount++;
            const now = performance.now();
            if (now - lastRateTime >= 1000) {
                lastRate = Math.round(msgCount / ((now - lastRateTime) / 1000));
                msgCount = 0; lastRateTime = now;
            }
            document.getElementById('rateVal').textContent = (lastRate || '--') + ' Hz';
        }

        function connectSSE() {
            const sDot = document.getElementById('serverDot');
            const sTxt = document.getElementById('serverText');
            const dDot = document.getElementById('deviceDot');
            const dTxt = document.getElementById('deviceText');
            const src = new EventSource('/api/events');
            src.onopen = () => { sDot.className = 'status-dot connected'; sTxt.textContent = 'Server'; };
            src.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    if (data.device_connected === true) {
                        dDot.className = 'status-dot connected'; dTxt.textContent = 'Device';
                    } else if (data.device_connected === false) {
                        dDot.className = 'status-dot disconnected'; dTxt.textContent = 'Device';
                    }
                    if (data.joints) onState(data);
                } catch(x){}
            };
            src.onerror = () => { sDot.className = 'status-dot disconnected'; sTxt.textContent = 'Server'; src.close(); setTimeout(connectSSE, 2000); };
        }
        connectSSE();

        // Publish enable/disable toggle
        let publishEnabled = true;
        window.togglePublish = function() {
            publishEnabled = !publishEnabled;
            const btn = document.getElementById('btnPublish');
            fetch('/api/publish_enable', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({enabled: publishEnabled})
            }).then(r => r.json()).then(d => {
                if (d.success) {
                    btn.textContent = d.enabled ? 'Publishing' : 'Muted';
                    btn.style.background = d.enabled ? '#66bb6a' : '#ef5350';
                }
            }).catch(() => { publishEnabled = !publishEnabled; });
        };

        // ── Render loop ──
        (function animate() {
            requestAnimationFrame(animate);
            if (robot && rawJointRad) {
                for (let i = 0; i < JOINT_NAMES.length; i++)
                    robot.setJointValue(JOINT_NAMES[i], rawJointRad[i]);
            }
            controls.update();
            renderer.render(scene, camera);
        })();
    </script>
</body>
</html>
